name: build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # needed by the release job to create a Release

jobs:

  build:
    name: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,       arch: arm64,  platform: macos }
          - { os: ubuntu-22.04,   arch: x86_64, platform: linux }
          - { os: windows-latest, arch: x86_64, platform: windows }

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/build.txt
          pip install -e .
      - name: Read version from pyproject.toml
        id: ver
        shell: bash
        run: |
          v=$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - name: Run PyInstaller
        run: pyinstaller ZeeRef.spec

      - name: Package macOS .app
        if: matrix.platform == 'macos'
        run: |
          cd dist
          ditto -c -k --keepParent ZeeRef.app \
            "ZeeRef-${{ steps.ver.outputs.version }}-macos-${{ matrix.arch }}.zip"

      - name: Package Linux build
        if: matrix.platform == 'linux'
        run: |
          cd dist
          tar czf "ZeeRef-${{ steps.ver.outputs.version }}-linux-${{ matrix.arch }}.tar.gz" \
            "ZeeRef-${{ steps.ver.outputs.version }}"

      - name: Build Windows installer
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          iscc /DAppVersion=${{ steps.ver.outputs.version }} `
               /FZeeRef-${{ steps.ver.outputs.version }}-windows-setup `
               installer.iss

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            dist/*.zip
            dist/*.tar.gz
            dist/*Setup*.exe
          retention-days: 5

  release:
    name: publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.zip
            artifacts/*.tar.gz
            artifacts/*.exe
          draft: true
          generate_release_notes: true
